server.port=8080

eureka.client.serviceUrl.defaultZone=http://discovery-service:8761/eureka

### AUTH ###
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/rig-and-barter-realm

### PERMITTED URLS FOR NO AUTH ###
#rb.security.permitted-get-urls=

spring.datasource.url=jdbc:postgresql://postgres-transaction:5431/transaction-service
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect