---
version: '3'
services:
  # PostgreSQL Docker Compose Config
  postgres-transaction:
    container_name: postgres-transaction
    image: postgres
    environment:
      POSTGRES_DB: transaction-service
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      PG_DATA: /data/postgres
    volumes:
      - ./dbs/postgres-transaction:/data/postgres
    expose:
      - "5431"
    ports:
      - "5431:5431"
    command: -p 5431
    restart: unless-stopped

  # MongoDB Docker Compose Config
  mongo:
    container_name: mongo
    image: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    expose:
      - "27017"
    volumes:
      - ./dbs/mongo-data:/data/db

  # Keycloak Docker Compose Config
  keycloak-mysql:
    container_name: keycloak-mysql
    image: mysql
    volumes:
      - ./dbs/mysql_keycloak_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: password

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak
    command: [ "start-dev", "--import-realm" ]
    environment:
      DB_VENDOR: MYSQL
      DB_ADDR: mysql
      DB_DATABASE: keycloak
      DB_USER: keycloak
      DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./realms/:/opt/keycloak/data/import/
    depends_on:
      - keycloak-mysql

  # Eureka Server Docker Compose Config
  discovery-service:
    container_name: discovery-service
    image: cjshore1996/discovery-service:latest
    pull_policy: always
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  api-gateway:
    container_name: api-gateway
    image: cjshore1996/api-gateway:latest
    pull_policy: always
    ports:
      - "8181:8080"
    expose:
      - "8181"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - discovery-service
      - keycloak

  # Listing Service Docker Compose Config
  listing-service:
    container_name: listing-service
    image: cjshore1996/listing-service:latest
    pull_policy: always
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - mongo
      - discovery-service
      - api-gateway

  # Transaction Service Docker Compose Config
  transaction-service:
    container_name: transaction-service
    image: cjshore1996/transaction-service:latest
    pull_policy: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres-transaction
      - discovery-service
      - api-gateway